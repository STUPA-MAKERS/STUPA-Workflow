# Basis-CI (T-01). Vollständige Gates/Stages/Coverage/Branch-Protection: T-04.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: basedpyright
        run: basedpyright
      - name: Pytest
        run: pytest

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose
        working-directory: deploy
        run: |
          cp .env.example .env
          docker compose config -q
