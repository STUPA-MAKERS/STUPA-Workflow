# CI-Gate (testing.md §4). Stage-Reihenfolge: Lint → Typecheck → BE-Unit →
# BE-Integration (testcontainers) → Contract (Schemathesis) → FE-Unit → E2E
# (Playwright vs Compose) → Coverage-Gate → Image-Build + Smoke. Schnelle Stages
# zuerst; rotes PR blockiert (Branch-Protection, s. CONTRIBUTING.md).
#
# Additiv konsolidiert (T-01/T-02/T-21 + T-04). FE-Stufen aktivieren sich
# automatisch, sobald `frontend/package.json` existiert (T-03); bis dahin neutral.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  # Opt-in trigger for the e2e job (see its `if:` gate): run manually via
  # Actions → Run workflow. Without this trigger the workflow_dispatch opt-in
  # documented on the e2e job would be unreachable.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  # clamd<=1.0.1 und text-unidecode bauen über d2to1 (importiert
  # setuptools.dist._get_unpatched, ab setuptools>=71 entfernt) → sdist-Build bricht.
  # Beide liefern Wheels; hart erzwingen (gezielt, alles andere darf weiter aus Quelle
  # bauen), damit ein Resolver-Backtrack auf eine sdist-only-Version nicht erneut bricht.
  PIP_ONLY_BINARY: "clamd,text-unidecode"
  PIP_PREFER_BINARY: "1"

jobs:
  # ---- Wegweiser: existiert ein Frontend-Projekt? -------------------------- #
  detect:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.check.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          if [ -f frontend/package.json ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  # ---- 1 Lint/Format ------------------------------------------------------- #
  be-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check .
      # Hinweis: `ruff format --check` läuft lokal via pre-commit (.pre-commit-config.yaml);
      # in CI nur Lint, solange Bestands-Skelett (T-02) noch nicht durchformatiert ist.

  # ---- 2 Typecheck --------------------------------------------------------- #
  be-typecheck:
    runs-on: ubuntu-latest
    needs: be-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e '.[dev]'
      - name: basedpyright
        run: basedpyright

  # ---- 3 BE-Unit (+ Coverage-XML als Artefakt) ----------------------------- #
  be-unit:
    runs-on: ubuntu-latest
    needs: be-typecheck
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e '.[dev]'
      - name: Pytest (Unit) + Coverage
        # fail_under=85 (pyproject [tool.coverage.report]) bricht hier bereits.
        run: pytest --cov --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ---- 4 BE-Integration (testcontainers: PG/Redis) ------------------------- #
  be-integration:
    runs-on: ubuntu-latest
    needs: be-unit
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e '.[dev]'
      - name: Pytest (Integration, Docker)
        run: pytest -m integration

  # ---- 5 Contract (Schemathesis vs OpenAPI) -------------------------------- #
  be-contract:
    runs-on: ubuntu-latest
    needs: be-unit
    defaults:
      run:
        working-directory: backend
    # Echte Postgres-Instanz: ab T-10 berühren Endpunkte (auth) die DB; ohne DB
    # würden sie 5xx liefern und `not_a_server_error` brechen. OIDC bleibt bewusst
    # unkonfiguriert → /auth/login|callback antworten 404 (kein externer Keycloak nötig).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: antrag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: "postgresql+asyncpg://app:pw@localhost:5432/antrag_test"
      SESSION_SECRET: "ci-session-secret"
      MAGIC_LINK_SECRET: "ci-magic-link-secret"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e '.[dev]'
      - name: Migrationen (alembic upgrade head)
        run: alembic upgrade head
      - name: App starten
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/health && break || sleep 1
          done
      - name: Schemathesis
        # Volle Contract-Checks mit zwei bewussten Ausnahmen:
        # - `unsupported_method`: erzwingt RFC-9110 `Allow`-Header am 405 — gehört in
        #   den Error-Contract-Handler (T-02), nicht hierher.
        # - `positive_data_acceptance`: erwartet 2xx für schema-valide Eingaben. Für
        #   Auth-Endpunkte (T-10) ist schema-valide ≠ semantisch gültig: ein wohl-
        #   geformter, aber nicht existierender Magic-Link-Token liefert korrekt 410,
        #   ein zufälliger OIDC-`code`/`state` 400/404. Diese 4xx sind erwünscht.
        #
        # `--seed` fix + schemathesis/hypothesis gepinnt (pyproject): macht den Lauf
        # deterministisch (sonst zieht jeder Lauf andere Zufallsfälle → flaky, mal grün
        # mal rot am selben Commit). Der Lauf ist aus dem RICHTIGEN Grund grün — kaputte/
        # malformte Bodies liefern app-weit einen dokumentierten 422 (s.
        # app/shared/errors.py), nicht durch Seed-Maskierung.
        run: >
          schemathesis run http://127.0.0.1:8000/openapi.json
          --checks all
          --exclude-checks unsupported_method,positive_data_acceptance
          --seed 1337

  # ---- 5b Dependency-Scan (pip-audit, security.md §10 / T-41) -------------- #
  be-deps-audit:
    runs-on: ubuntu-latest
    needs: be-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      # pip selbst aktuell halten (pip-Advisories sonst rot; pip ist kein Runtime-Dep).
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev]' pip-audit
      - name: pip-audit (bekannte CVEs in Abhängigkeiten)
        # Scannt die aufgelöste Umgebung gegen die PyPI-Advisory-DB; bricht das Gate bei
        # einer verwundbaren Abhängigkeit. `--skip-editable` überspringt das lokale,
        # nicht-auf-PyPI liegende Projektpaket. Einzelne, geprüft-irrelevante Advisories
        # lassen sich gezielt mit `--ignore-vuln <GHSA/PYSEC-ID>` (mit Begründung) ausnehmen.
        #
        # PYSEC-2026-87 (lxml<6.1 XXE-Local-File-Read): lxml kommt nur transitiv über
        # fints/sepaxml/xmlschema und fints pinnt lxml~=6.0.2 (<6.1) hart — 6.1.0 ist daher
        # nicht installierbar (#fints). lxml verarbeitet hier ausschließlich die
        # authentifizierten Bank-Antworten; eigenes (untrusted) XML parsen wir mit der
        # stdlib `ElementTree`. Risiko in diesem Kontext nicht erreichbar → ausgenommen,
        # bis fints lxml>=6.1 zulässt.
        run: pip-audit --skip-editable --desc --ignore-vuln PYSEC-2026-87

  # ---- 6 FE-Unit/Komponente (Jest + ATL) ----------------------------------- #
  fe-unit:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
        with:
          # @stupa-makers/ui-kit lives at frontend/vendor/ui-kit as a git submodule.
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint --if-present
      - name: tsc
        run: npx tsc --noEmit
      - name: Jest + Coverage (Gate 80 %)
        # Schwelle in jest.config (coverageThreshold global 80). Rot ⇒ Build bricht.
        run: npm test -- --coverage --watch=false
      - name: Build
        run: npm run build

  # ---- 7 E2E (Playwright vs echtem Compose-Stack) — SCHARF (T-40) ----------- #
  # Deterministische Kern-Journeys gegen den ECHTEN Stack (Mock seit #101 AUS) +
  # mailpit-SMTP-Sink + Seed-Service. KEIN Keycloak/pytex/ClamAV auf dem Gate-Pfad →
  # stabil & schnell genug fürs PR-Gate (Frederik: lieber stabil als flaky).
  # scripts/e2e.sh fährt hoch, seedet, läuft Playwright, räumt ab (down -v). Die noch
  # offenen, flakeanfälligen/langsamen Szenarien (async Voting, Live-Vote-WS,
  # Protokoll→PDF, OIDC) sind als Follow-up-Issues ausgelagert (siehe e2e/README.md),
  # NICHT als hohle Stubs. Der Report wird immer hochgeladen (Beweis: >0 Tests).
  e2e:
    runs-on: ubuntu-latest
    needs: [detect, be-unit, fe-unit]
    # DEAKTIVIERT auf dem Standard-Gate-Pfad — opt-in (nicht gelöscht, weiter lauffähig):
    #   - manuell:   Actions → Run workflow (workflow_dispatch)
    #   - pro PR:    Label `run-e2e` setzen
    #   - dauerhaft: Repo-Variable RUN_E2E=true
    # Vorher lief der Job bei jedem Push/PR mit Frontend; jetzt erscheint er neutral
    # als *skipped* und blockiert das Gate nicht (kein Job hängt von ihm ab).
    if: >-
      needs.detect.outputs.frontend == 'true'
      && (
        github.event_name == 'workflow_dispatch'
        || contains(github.event.pull_request.labels.*.name, 'run-e2e')
        || vars.RUN_E2E == 'true'
      )
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: FE-Deps + Playwright-Browser
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: E2E (vs echtem Stack)
        run: scripts/e2e.sh
      - name: Playwright-Report (immer — Beweis >0 Tests)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: warn
          retention-days: 7

  # ---- 8 Coverage-Gate ----------------------------------------------------- #
  # Gesamt-Gate bricht bereits in be-unit. Hier zusätzlich das strengere Gate für
  # kritische Module (100 % Branch, testing.md §1).
  coverage-gate:
    runs-on: ubuntu-latest
    needs: [be-unit, be-integration]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
      - name: Kritische Module 100 % Branch
        working-directory: backend
        # BLOCKIEREND: auth, voting, flow, budget, webhooks und audit erreichen jetzt
        # 100 % Branch in der reinen Unit-Suite (DB-lose Fakes). Das Gate hält diesen
        # Stand — fällt ein kritisches Modul unter 100 % Branch, bricht der Build.
        run: python -m scripts.coverage_critical coverage.xml pyproject.toml

  # ---- 9 Image-Build + Smoke ---------------------------------------------- #
  image-build-smoke:
    runs-on: ubuntu-latest
    needs: coverage-gate
    steps:
      - uses: actions/checkout@v7
      - name: Backend-Image bauen
        run: docker build -t antrag-backend:ci backend
      - name: Container-Smoke (/api/health)
        run: |
          docker run -d --name api-smoke -p 8000:8000 \
            -e DATABASE_URL="postgresql+asyncpg://app:pw@localhost/antrag_test" \
            -e SESSION_SECRET="ci-session-secret" \
            -e MAGIC_LINK_SECRET="ci-magic-link-secret" \
            -e FORWARDED_ALLOW_IPS="*" \
            antrag-backend:ci
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/health && ok=1 && break || sleep 1
          done
          docker logs api-smoke
          docker rm -f api-smoke
          [ "${ok:-0}" = "1" ] || { echo "Smoke fehlgeschlagen"; exit 1; }

  # ---- pytex (T-21, beibehalten) ------------------------------------------ #
  pytex:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pytex
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: basedpyright
        run: basedpyright
      - name: Pytest
        # Unit suite only; real-render tests are opt-in (RUN_PYTEX_INTEGRATION).
        run: pytest

  # ---- Compose-Validierung (T-01, beibehalten) ---------------------------- #
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate docker-compose
        working-directory: deploy
        run: |
          cp .env.example .env
          docker compose config -q

  # ---- Restore-Smoke (T-42) ----------------------------------------------- #
  # Beweist die Backup->Restore-Runde gegen einen Wegwerf-Stack (DB + MinIO).
  # Opt-in wie e2e: baut das backup-Image + lädt mc -> zu schwer/langsam für jeden
  # PR. Standardlauf erscheint sauber als *skipped* (neutral), blockiert nicht:
  #   - manuell:   Actions → Run workflow (workflow_dispatch)
  #   - pro PR:    Label `run-restore-smoke` setzen
  #   - dauerhaft: Repo-Variable RUN_RESTORE_SMOKE=true
  restore-smoke:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(github.event.pull_request.labels.*.name, 'run-restore-smoke')
      || vars.RUN_RESTORE_SMOKE == 'true'
    steps:
      - uses: actions/checkout@v7
      - name: Restore-Smoke (backup -> wipe -> restore -> verify)
        run: scripts/restore-smoke.sh

  # ---- Real-Stack-Smoke (Prozess-Fix) ------------------------------------- #
  # Fährt den VOLLEN Compose-Stack hoch (Mock AUS, Bootstrap-Admin gesetzt) und
  # prüft die Kernflüsse rein über HTTP/WS (API up, /api/health, public/auth-Pfade,
  # WS-Handshake). Gedacht, um eine Welle bewusst gegen den echten Stack zu testen.
  # Opt-in wie e2e/restore-smoke: voller Build + ClamAV-Load -> zu schwer für jeden
  # PR. Standardlauf erscheint sauber als *skipped* (neutral), blockiert nicht:
  #   - manuell:   Actions → Run workflow (workflow_dispatch)
  #   - pro PR:    Label `run-real-stack-smoke` setzen
  #   - dauerhaft: Repo-Variable RUN_REAL_STACK_SMOKE=true
  real-stack-smoke:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(github.event.pull_request.labels.*.name, 'run-real-stack-smoke')
      || vars.RUN_REAL_STACK_SMOKE == 'true'
    steps:
      - uses: actions/checkout@v7
      - name: Real-Stack-Smoke (compose up -> HTTP/WS-Kernflüsse)
        run: scripts/smoke-real-stack.sh
