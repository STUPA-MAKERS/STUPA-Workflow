<section class="notif">
  <header class="notif__head">
    <h1>{{ 'account.notifications.title' | t }}</h1>
    <p class="m-0 text-muted">{{ 'account.notifications.intro' | t }}</p>
  </header>

  @if (error()) {
    <p class="text-danger m-0" role="alert">{{ $any(error()) | t }}</p>
  }

  <section class="border border-solid border-line rounded-lg py-4 px-5 bg-surface">
    @if (loading()) {
      <p class="text-muted m-0" aria-live="polite">{{ 'admin.audit.loading' | t }}</p>
    } @else {
      <ul class="notif__list">
        @for (p of prefs(); track p.kind) {
          <li class="notif__item">
            <app-checkbox
              [ngModel]="p.enabled"
              (ngModelChange)="toggle(p.kind, $event)"
              [hint]="kindHint(p.kind)"
            >
              {{ kindLabel(p.kind) }}
            </app-checkbox>
          </li>
        }
      </ul>
    }
  </section>
</section>
