# Antragsplattform — docker-compose Skelett (T-01)
# Eine VM, plain HTTP intern hinter externem Nginx Proxy Manager (TLS-Edge).
# Kein TLS/Cert/Keycloak im Stack. Einziger Host-Port: `web` (127.0.0.1:8080).
# Alle anderen Services nur intern -> kein Internet-Ingress. Egress erlaubt
# (worker: SMTP/WebDAV/Webhooks, pytex: tectonic-Bundle, api: OIDC).
# Referenz: sds/deployment.md §1-§5, sds/overview.md §2.

name: antragsplattform

x-restart: &restart
  restart: unless-stopped

services:
  web:
    # SPA-Static + Routing /api -> api. Einziger NPM-Upstream.
    # Multi-Stage-Image baut das Angular-FE (frontend/) und liefert es per nginx
    # aus. Context = Repo-Root, damit frontend/ + deploy/web/nginx.conf greifbar.
    build:
      context: ..
      dockerfile: deploy/web/Dockerfile
    <<: *restart
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Nur lokal gebunden; externer NPM proxyt hierher (oder via `proxy`-Netz).
      - "127.0.0.1:8080:80"
    volumes:
      # nginx.conf ist ins Image gebacken; Mount erlaubt prod-Edits (real_ip-CIDR)
      # ohne Rebuild. SPA-HTML kommt aus dem Image (kein html-Mount mehr).
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    # One-Shot-Migrator (Issue #38): fährt VOR api/worker `alembic upgrade head`
    # gegen die DB — race-frei (wartet auf postgres healthy) und idempotent
    # (alembic überspringt bereits angewandte Revisions). Kein restart-Loop:
    # läuft einmal bis exit 0, api/worker hängen via `service_completed_successfully`
    # daran. Migrations-URL: env.py nimmt DB_MIGRATION_URL→DATABASE_URL (s. .env);
    # Default-Stack migriert als app-User. Nutzt dasselbe Backend-Image wie api.
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  api:
    # FastAPI (uvicorn --proxy-headers). Kein Host-Port.
    build:
      context: ../backend
      dockerfile: Dockerfile
    <<: *restart
    env_file: .env
    # MCP-Quellpaket read-only mounten, damit der Self-Service-Download
    # (GET /api/mcp/package) das `mcp/`-Verzeichnis findet (Build-Context ist nur
    # ../backend, daher liegt es nicht im Image). MCP_PACKAGE_DIR zeigt darauf.
    volumes:
      - ../mcp:/opt/mcp:ro
    environment:
      MCP_PACKAGE_DIR: /opt/mcp
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      # internal = Egress (OIDC) + interne Services; pytex_net = egress-loser Render-Pfad.
      - internal
      - pytex_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    # arq Worker + Cron (deadlines, retries, rollups). Kein Host-Port.
    build:
      context: ../backend
      dockerfile: Dockerfile
    <<: *restart
    command: ["arq", "worker.main.WorkerSettings"]
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      # ClamAV lädt Signaturen minutenlang → nur „gestartet" abwarten; der Scan-Task
      # retryt, bis clamd bereit ist (kein Worker-Block beim Boot).
      clamav:
        condition: service_started
    networks:
      # internal = Egress (SMTP/WebDAV/Webhooks) + interne Services; pytex_net = Render-Pfad.
      - internal
      - pytex_net
    healthcheck:
      test: ["CMD-SHELL", "arq --check worker.main.WorkerSettings || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    <<: *restart
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    # Explizit gepinnt (keine :latest) -> reproduzierbare Deploys + Versions-Audit-Trail.
    # Bei Bump: Tag + Datum in deploy/README/Notes vermerken.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    pull_policy: missing
    <<: *restart
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  clamav:
    # Explizit gepinnt (keine :latest) -> reproduzierbare Deploys + Versions-Audit-Trail.
    # 1.x Patch-Tag; bei Bump Version in deploy-Notes vermerken.
    image: clamav/clamav:1.4.3
    pull_policy: missing
    <<: *restart
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - internal
    healthcheck:
      # clamd lädt Signaturen beim Start (mehrere Minuten) -> langes start_period.
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 300s

  pytex:
    # FastAPI-Wrapper um pytex_api.render_blob (md->pdf, Variante via Frontmatter).
    # pytex v1.0.0; tectonic-Bundle lazy in pytex_cache (XDG_CACHE_HOME=/cache).
    build:
      context: ../pytex
      dockerfile: Dockerfile
    <<: *restart
    env_file: .env
    volumes:
      - pytex_cache:/cache
    networks:
      # NUR das egress-lose pytex_net (internal: true): der Render-Container braucht
      # zur Laufzeit kein Internet (tectonic-Bundle + biber sind ins Image gebacken,
      # entrypoint.sh seedet den Cache). Damit wird ein etwaiger Compile-Time-Read/Exec
      # (shell-escape) nicht zum Exfiltrations-Kanal (#sec-audit). api/worker erreichen
      # pytex weiterhin über dieses Netz.
      - pytex_net
    # OS-Sandbox auf DEM Service, der LaTeX/Python ausführt (#sec-audit AUD-009):
    # härter als altcha/backup, da pytex der einzige Render-/Exec-Pfad ist.
    # - no-new-privileges: setuid/setgid kann keine Rechte eskalieren.
    # - cap_drop ALL: kein Linux-Capability bleibt; uvicorn/tectonic brauchen keine.
    # - read_only Rootfs: Code (/app) + Bundle (/usr/local/bin) unveränderbar; ein
    #   Compile-Time-Exec-Bypass kann das Image nicht persistent verändern.
    # Schreibbar bleiben nur: das pytex_cache-Volume (/cache, XDG_CACHE_HOME inkl.
    # fontconfig-Cache) und zwei tmpfs — /tmp (tectonic kompiliert in /tmp/pytex-api-*)
    # und /home/pytex (HOME des uid-10001-Users). Beide tmpfs nodev/nosuid/noexec.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,nodev,nosuid,noexec,size=512m
      - /home/pytex:rw,nodev,nosuid,noexec,size=16m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8099/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  altcha:
    # Captcha-Verifier: ALTCHA Sentinel (offizielles self-hosted Image).
    # Lauscht intern auf :8080, persistiert nach /data. KEIN Host-Port —
    # erreichbar nur über das interne Netz (altcha:8080), kein Internet-Ingress.
    # Erstes Login root/<ALTCHA_ROOT_PASSWORD> (DEFAULT_ROOT_PASSWORD); das
    # Passwort ist Pflicht (deploy.sh blockt leer/"root"). Fehlende
    # Secrets (JWT_SECRET, CODE_CHALLENGE_SECRET) generiert Sentinel selbst nach
    # /data/.env. Reale Captcha-Wiring zur Anwendung folgt im Captcha-Task.
    image: ghcr.io/altcha-org/sentinel:1.31.1
    <<: *restart
    environment:
      DEFAULT_ROOT_PASSWORD: ${ALTCHA_ROOT_PASSWORD}
      ALTCHA_HMAC_SECRET: ${ALTCHA_HMAC_SECRET}
    volumes:
      - altcha_data:/data
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  backup:
    # Tägliches verschlüsseltes Backup (T-42, deployment.md §4): pg_dump (custom) +
    # mc mirror (MinIO) -> ein age-verschlüsseltes Artefakt im backups-Volume, mit
    # Retention. Eigener Job statt Cron im worker -> entkoppelt vom App-Lifecycle.
    # Nur im prod-Profil aktiv (im Default-Stack aus, damit der Smoke schlank bleibt).
    # Profil `backup` erlaubt das Ziehen/Restoren ohne den Rest des prod-Profils.
    # Manuell: docker compose --profile backup run --rm backup backup.sh
    build:
      context: ./backup
    profiles: ["prod", "backup"]
    <<: *restart
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Restore braucht den privaten age-Key (off-host). Default-Pfad existiert im
      # Normalbetrieb NICHT -> Backup (encrypt-only) läuft trotzdem. Nur zum Restore
      # eine Key-Datei nach ./backup/secrets/age.key legen (gitignored).
      - backups:/backups
      # :z relabelt für SELinux-Hosts (Fedora/rootless podman); auf Nicht-SELinux
      # (CI/ubuntu) ein No-op. Ohne -> "Permission denied" beim Lesen des age-Keys.
      - ./backup/secrets:/secrets:ro,z
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  # TODO(T-04/e2e): Für aktivierbare e2e (T-10 Auth + Captcha + Playwright-Specs)
  # hier dev-Profile-Services ergänzen — MailHog (SMTP-Sink) und Dev-Keycloak-Mock —
  # unter `profiles: [dev]`, damit der Prod-Stack unberührt bleibt. Bewusst noch
  # nicht angelegt (kein Consumer), siehe e2e-Job in .github/workflows/ci.yml.

volumes:
  pg_data:
  minio_data:
  redis_data:
  clamav_data:
  pytex_cache:
  backups:
  altcha_data:

networks:
  internal:
    # Keine publizierten Host-Ports an diesen Services => kein Internet-Ingress.
    # Egress (Internet/Intranet) bleibt erlaubt für worker/api.
    driver: bridge
  pytex_net:
    # Render-Pfad api/worker <-> pytex. `internal: true` => KEIN Egress: der pytex-
    # Container kann nichts ins Internet senden (tectonic/biber/Cache sind ins Image
    # gebacken). Schließt einen Exfiltrations-Kanal bei Compile-Time-Exec (#sec-audit).
    driver: bridge
    internal: true
  proxy:
    # In prod: externes NPM-Netz. Dann hier `external: true` setzen und das
    # vom Nginx Proxy Manager verwaltete Netz referenzieren.
    driver: bridge
