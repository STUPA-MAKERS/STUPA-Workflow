# Antragsplattform — docker-compose Skelett (T-01)
# Eine VM, plain HTTP intern hinter externem Nginx Proxy Manager (TLS-Edge).
# Kein TLS/Cert/Keycloak im Stack. Einziger Host-Port: `web` (127.0.0.1:8080).
# Alle anderen Services nur intern -> kein Internet-Ingress. Egress erlaubt
# (worker: SMTP/WebDAV/Webhooks, pytex: tectonic-Bundle, api: OIDC).
# Referenz: sds/deployment.md §1-§5, sds/overview.md §2.

name: antragsplattform

x-restart: &restart
  restart: unless-stopped

services:
  web:
    # SPA-Static + Routing /api -> api. Einziger NPM-Upstream.
    # Multi-Stage-Image baut das Angular-FE (frontend/) und liefert es per nginx
    # aus. Context = Repo-Root, damit frontend/ + deploy/web/nginx.conf greifbar.
    build:
      context: ..
      dockerfile: deploy/web/Dockerfile
    <<: *restart
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Nur lokal gebunden; externer NPM proxyt hierher (oder via `proxy`-Netz).
      - "127.0.0.1:8080:80"
    volumes:
      # nginx.conf ist ins Image gebacken; Mount erlaubt prod-Edits (real_ip-CIDR)
      # ohne Rebuild. SPA-HTML kommt aus dem Image (kein html-Mount mehr).
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    # FastAPI (uvicorn --proxy-headers). Kein Host-Port.
    build:
      context: ../backend
      dockerfile: Dockerfile
    <<: *restart
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    # arq Worker + Cron (deadlines, retries, rollups). Kein Host-Port.
    build:
      context: ../backend
      dockerfile: Dockerfile
    <<: *restart
    command: ["arq", "worker.main.WorkerSettings"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "arq --check worker.main.WorkerSettings || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    <<: *restart
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    <<: *restart
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  clamav:
    image: clamav/clamav:latest
    <<: *restart
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - internal
    healthcheck:
      # clamd lädt Signaturen beim Start (mehrere Minuten) -> langes start_period.
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 300s

  pytex:
    # FastAPI-Wrapper um pytex_api.render_blob (md->pdf, Variante via Frontmatter).
    # pytex v1.0.0; tectonic-Bundle lazy in pytex_cache (XDG_CACHE_HOME=/cache).
    build:
      context: ../pytex
      dockerfile: Dockerfile
    <<: *restart
    env_file: .env
    volumes:
      - pytex_cache:/cache
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8099/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  altcha:
    # Captcha-Verifier: ALTCHA Sentinel (offizielles self-hosted Image).
    # Lauscht intern auf :8080, persistiert nach /data. KEIN Host-Port —
    # erreichbar nur über das interne Netz (altcha:8080), kein Internet-Ingress.
    # Erstes Login root/root (DEFAULT_ROOT_PASSWORD), sofort ändern. Fehlende
    # Secrets (JWT_SECRET, CODE_CHALLENGE_SECRET) generiert Sentinel selbst nach
    # /data/.env. Reale Captcha-Wiring zur Anwendung folgt im Captcha-Task.
    image: ghcr.io/altcha-org/sentinel:1.31.1
    <<: *restart
    environment:
      DEFAULT_ROOT_PASSWORD: ${ALTCHA_ROOT_PASSWORD}
      ALTCHA_HMAC_SECRET: ${ALTCHA_HMAC_SECRET}
    volumes:
      - altcha_data:/data
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  # TODO(T-04/e2e): Für aktivierbare e2e (T-10 Auth + Captcha + Playwright-Specs)
  # hier dev-Profile-Services ergänzen — MailHog (SMTP-Sink) und Dev-Keycloak-Mock —
  # unter `profiles: [dev]`, damit der Prod-Stack unberührt bleibt. Bewusst noch
  # nicht angelegt (kein Consumer), siehe e2e-Job in .github/workflows/ci.yml.

volumes:
  pg_data:
  minio_data:
  redis_data:
  clamav_data:
  pytex_cache:
  backups:
  altcha_data:

networks:
  internal:
    # Keine publizierten Host-Ports an diesen Services => kein Internet-Ingress.
    # Egress (Internet/Intranet) bleibt erlaubt für worker/pytex/api.
    driver: bridge
  proxy:
    # In prod: externes NPM-Netz. Dann hier `external: true` setzen und das
    # vom Nginx Proxy Manager verwaltete Netz referenzieren.
    driver: bridge
