# web/nginx.conf — plain HTTP, kein TLS (TLS terminiert externer NPM).
# sds/deployment.md §2. real_ip vom Proxy, WS-Upgrade, /api-Proxy, SPA-Fallback,
# Security-Header.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# nginx-Version NICHT im Server-Header / auf Error-Pages leaken (AUD-068, passive
# Recon-Härtung). Gilt im http-Kontext für alle server-Blöcke.
server_tokens off;

server {
    listen 80;
    server_name _;

    # Echte Client-IP vom vorgelagerten Proxy (NPM) übernehmen.
    # WICHTIG (security.md §3, spiegelt FORWARDED_ALLOW_IPS in .env.example): NUR die
    # konkrete IP/CIDR des DIREKTEN Upstreams (externes NPM) eintragen, NIEMALS ganze
    # RFC1918-Bereiche (/8,/12,/16). Sonst kann jeder Container im internal-/proxy-Netz
    # (172.x) X-Forwarded-For spoofen → falsche Audit-Client-IP + Bypass/Lockout der
    # Per-IP-Rate-Limits. Diese Datei ist bind-gemountet → prod-Edit auf die eigene
    # NPM-Adresse. Der Platzhalter unten matcht absichtlich keinen Sibling-Container, d.h.
    # real_ip no-opt sicher (kein XFF-Vertrauen), bis die echte Proxy-IP eingetragen ist.
    set_real_ip_from 192.0.2.1;  # RFC5737 TEST-NET-1 Platzhalter — in prod ersetzen.
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    root /usr/share/nginx/html;
    index index.html;

    # Security-Header (Edge-seitig hier gesetzt).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    # Ungenutzte Browser-Features per Default deaktivieren (AUD-068).
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS (Strict-Transport-Security) wird hier NICHT gesetzt: TLS terminiert am
    # externen NPM (listen 80, plain HTTP). HSTS MUSS am TLS-Terminator (NPM) gesetzt
    # werden — dort verifizieren, dass NPM "Strict-Transport-Security: max-age=...;
    # includeSubDomains" emittiert. Am HTTP-Edge gesetzt wäre es laut Spec wirkungslos.

    # Container-Liveness (Healthcheck).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # API-Proxy -> FastAPI. X-Forwarded-Proto vom NPM durchreichen.
    # Datei-Upload (T-13): primäre Body-Schranke am Edge = 10 MB + etwas Multipart-
    # Overhead, bevor die App puffert (security.md §6, anti /tmp-DoS). Regex-location
    # hat Vorrang vor dem /api/-Prefix → gilt nur für den Attachment-Upload. Die
    # App-Prüfung (gekapptes Lesen → 413) bleibt als Defense-in-Depth.
    location ~ ^/api/applications/[^/]+/attachments/?$ {
        client_max_body_size 11m;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # Rechnungs-Upload (#invoices/ZUGFeRD): eigene, größere Body-Schranke, sonst würde
    # die allgemeine /api/-Schranke (1 MB unten) reale Belege-PDFs (oft > 1 MB, bis zum
    # In-App-Limit attachment_max_bytes = 10 MB) am Edge mit 413 blocken. Regex-location
    # hat Vorrang vor dem /api/-Prefix → gilt nur für die Invoice-Upload-Routen.
    location ~ ^/api/invoices/(parse|file)/?$ {
        client_max_body_size 11m;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    location /api/ {
        # Primäre Body-Schranke (security.md §6, Review #3): begrenzt das Puffern am
        # Edge, bevor die App liest — fängt auch Transfer-Encoding: chunked ohne
        # Content-Length. Die App-Caps (magic-link/applications) prüfen zusätzlich
        # feiner. Datei-Uploads (/api/applications/{id}/attachments) haben eine eigene,
        # größere location (oben).
        client_max_body_size 1m;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    # WebSocket-Upgrade für Live-Vote etc.
    location /api/ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 3600s;
    }

    # OAuth2-Discovery (RFC 8414/9728) für MCP-Clients: muss am Root liegen (Konvention),
    # daher eigener Proxy vor dem SPA-Fallback statt index.html auszuliefern.
    location ~ ^/\.well-known/oauth-(authorization-server|protected-resource)$ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Dynamisches PWA-Manifest: Browser verlinkt <link rel="manifest"
    # href="manifest.webmanifest"> am Root, der Inhalt (name/short_name) folgt aber der
    # aktiven Site-Config. Exact-match-location hat Vorrang vor dem SPA-Fallback und der
    # statischen Datei → Proxy auf die Backend-Route (dort unter /api gemountet). Die
    # Manifest-Werte scope/start_url bleiben "./" → relativ zu /manifest.webmanifest =
    # "/", also identisch zum bisherigen Verhalten.
    location = /manifest.webmanifest {
        proxy_pass http://api:8000/api/manifest.webmanifest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # SPA-Fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
