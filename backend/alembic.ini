# Alembic-Konfiguration (T-06). DB-URL wird in `migrations/env.py` aus den
# App-Settings gezogen (asyncpg); `sqlalchemy.url` hier bleibt leer und kann je
# Lauf (Tests/CI) via `-x` / set_main_option überschrieben werden.
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
# Migrations-Dateinamen: NNNN_<modul>_<beschreibung> (data-model §4).
file_template = %%(rev)s_%%(slug)s
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
